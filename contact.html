<body>

<header class="topbar">
  <a class="mark" href="index.html">S.S.</a>
  <nav class="nav-links">
    <a href="works.html">Works</a>

  <button class="nav-toggle" id="navToggle" aria-label="メニューを開く" aria-expanded="false">

  </button>

</header>

<nav class="nav-overlay" id="navOverlay">
  <a href="index.html">Home</a>

</nav>

<script>
  (function(){
    const btn = document.getElementById('navToggle');
    const overlay = document.getElementById('navOverlay');
    btn.addEventListener('click', () => {
      const open = document.body.classList.toggle('menu-open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    overlay.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      document.body.classList.remove('menu-open');
      btn.setAttribute('aria-expanded', 'false');
    }));
  })();
</script>

<main>
  <section class="contact-hero">
    <p class="eyebrow reveal-up">Contact</p>
    <p class="contact-line reveal-up">新しいプロジェクトのご相談、お気軽にどうぞ。</p>

  </footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>

<script>
(function(){
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const clockEl = document.getElementById('clock');
  function tickClock(){
    const now = new Date();
    clockEl.textContent = `TOKYO — ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }
  tickClock(); setInterval(tickClock, 15000);

  const canvas = document.getElementById('gl');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 6.5);

  const geo = new THREE.IcosahedronGeometry(1.7, 1);
  const wire = new THREE.LineSegments(new THREE.WireframeGeometry(geo), new THREE.LineBasicMaterial({ color:0xf2f1ed, transparent:true, opacity:0.16 }));
  scene.add(wire);

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  let targetRotX = 0, targetRotY = 0;
  if (!reduceMotion && matchMedia('(pointer:fine)').matches){
    window.addEventListener('mousemove', (e) => {
      targetRotY = (e.clientX / window.innerWidth - 0.5) * 0.3;
      targetRotX = (e.clientY / window.innerHeight - 0.5) * 0.3;
    });
  }

  let baseRotY = 0;
  function animate(){
    requestAnimationFrame(animate);
    if (!reduceMotion) baseRotY += 0.0012;
    wire.rotation.y = baseRotY + targetRotY;
    wire.rotation.x = 0.3 + targetRotX;
    renderer.render(scene, camera);
  }
  animate();

  gsap.registerPlugin(ScrollTrigger);
  if (!reduceMotion && window.Lenis){
    const lenis = new Lenis({ duration: 1.1, smoothWheel: true });
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add((time) => lenis.raf(time * 1000));
    gsap.ticker.lagSmoothing(0);
  }

  gsap.utils.toArray('.reveal-up').forEach((el, i) => {
    gsap.to(el, {
      opacity: 1, y: 0, duration: 0.9, ease: 'power2.out',
      delay: reduceMotion ? 0 : i * 0.08
    });
  });
})();
</script>

</body>
</html>
